name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: cargo check
        run: cargo check
      - name: cargo clippy
        run: cargo clippy -- -D warnings
      - name: cargo test
        run: cargo test
      - name: Check stubs are up to date
        run: |
          cargo install cargo-php --locked
          cargo build
          cargo php stubs --stdout > stubs/ammonia.stubs.php.new
          diff stubs/ammonia.stubs.php stubs/ammonia.stubs.php.new || (echo "Stubs are out of date. Run: cargo build && cargo php stubs --stdout > stubs/ammonia.stubs.php" && exit 1)
